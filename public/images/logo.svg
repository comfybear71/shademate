<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 640 400" font-family="Arial Black, Arial, sans-serif">
  <!-- ShadeMate logo — hand-built vector, transparent background -->
  <defs>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="rockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#9a3412"/>
    </linearGradient>
    <clipPath id="aboveGround">
      <rect x="0" y="0" width="640" height="214"/>
    </clipPath>
  </defs>

  <!-- Sun, clipped at the ground line -->
  <g clip-path="url(#aboveGround)">
    <circle cx="320" cy="210" r="92" fill="url(#sunGrad)"/>
    <circle cx="320" cy="212" r="58" fill="#fbbf24"/>
  </g>

  <!-- Uluru -->
  <path d="M 185 212 Q 205 180 245 173 Q 292 164 330 167 Q 398 162 435 180 Q 452 191 457 212 Z" fill="url(#rockGrad)"/>
  <!-- Rock striations -->
  <g stroke="#7c2d12" stroke-width="4" stroke-linecap="round" opacity="0.55" fill="none">
    <path d="M 248 180 Q 252 196 249 210"/>
    <path d="M 285 172 Q 289 192 287 210"/>
    <path d="M 322 170 Q 324 190 322 210"/>
    <path d="M 360 171 Q 363 191 362 210"/>
    <path d="M 398 176 Q 402 193 401 210"/>
  </g>

  <!-- Ground line -->
  <rect x="120" y="208" width="400" height="12" rx="6" fill="#3f2212"/>

  <!-- Left gum tree -->
  <g>
    <path d="M 152 210 Q 150 178 145 158 M 149 184 Q 138 174 130 170 M 148 174 Q 158 162 168 158" stroke="#4a2c17" stroke-width="6" stroke-linecap="round" fill="none"/>
    <ellipse cx="124" cy="162" rx="26" ry="16" fill="#16a34a"/>
    <ellipse cx="150" cy="144" rx="30" ry="17" fill="#15803d"/>
    <ellipse cx="178" cy="156" rx="24" ry="14" fill="#16a34a"/>
  </g>

  <!-- Right gum tree -->
  <g>
    <path d="M 492 210 Q 494 174 498 154 M 495 182 Q 506 172 514 168 M 496 170 Q 486 160 476 156" stroke="#4a2c17" stroke-width="6" stroke-linecap="round" fill="none"/>
    <ellipse cx="518" cy="160" rx="26" ry="16" fill="#16a34a"/>
    <ellipse cx="492" cy="140" rx="30" ry="17" fill="#15803d"/>
    <ellipse cx="464" cy="154" rx="24" ry="14" fill="#16a34a"/>
  </g>

  <!-- SHADEMATE wordmark -->
  <text x="320" y="290" font-size="64" font-weight="900" text-anchor="middle" letter-spacing="2">
    <tspan fill="#0e7490">SHADE</tspan><tspan fill="#d97706">MATE</tspan>
  </text>

  <!-- Ribbon: tagline -->
  <g>
    <path d="M 135 312 L 115 336 L 135 360 Z" fill="#d97706"/>
    <path d="M 505 312 L 525 336 L 505 360 Z" fill="#d97706"/>
    <rect x="130" y="310" width="380" height="42" rx="4" fill="#fbbf24"/>
    <text x="320" y="338" font-size="22" font-weight="800" fill="#1e3a8a" text-anchor="middle" letter-spacing="2">YOUR AIRCON&#8217;S BEST MATE</text>
  </g>
</svg>
